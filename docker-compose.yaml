version: "3.9"

services:  
  registry:
    image: registry:2
    restart: always
    ports:
      - 5000:5000
    volumes:
      - ./data:/var/lib/registry
      - ./nginx/htpasswd:/auth/htpasswd
      - ./nginx/config.yml:/etc/docker/registry/config.yml
    
  nginx:
    image: nginx:stable
    restart: always
    ports:
     - 8080:80
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    